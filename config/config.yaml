# SendFlix Configuration File

environment: development

service:
  name: sendflix
  version: 1.0.0

# HTTP Server
http:
  enabled: true
  host: 0.0.0.0
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

# gRPC Server
grpc:
  enabled: false
  host: 0.0.0.0
  port: 50051

# Database (PostgreSQL)
database:
  url: postgres://sendflix:sendflix@localhost:5432/sendflix?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 30m
  conn_max_idle_time: 10m

# SMTP Provider
smtp:
  enabled: true
  host: smtp.gmail.com
  port: 587
  username: ${SMTP_USERNAME}
  password: ${SMTP_PASSWORD}
  from_email: noreply@sendflix.com
  from_name: SendFlix
  use_tls: true
  use_ssl: false
  skip_verify: false
  timeout: 30s
  pool_min_size: 5
  pool_max_size: 20
  pool_max_lifetime: 30m
  pool_max_idle_time: 10m
  pool_health_interval: 2m
  bulk_workers: 10
  rate_limit: 10

# Background Workers
workers:
  scheduler:
    enabled: true
    interval: 1m
    batch_size: 100

  retry:
    enabled: true
    interval: 5m
    batch_size: 50
    max_retries: 3
    base_delay: 1m

  cleanup:
    enabled: true
    interval: 24h
    retention_days: 90

# Logging
logging:
  level: info # debug, info, warn, error
  format: json # json, console

# Metrics
metrics:
  enabled: true
  port: 9090
  path: /metrics
